name: Hugging Face Sync and Control

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: "Action to run"
        required: true
        default: "sync-and-rebuild"
        type: choice
        options:
          - sync-and-rebuild
          - restart
          - factory-rebuild
          - status

concurrency:
  group: hugging-face-space
  cancel-in-progress: true

jobs:
  control-space:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub client
        run: python -m pip install --upgrade huggingface_hub

      - name: Sync and control Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: OSOCONSULT/getem
          REQUESTED_ACTION: ${{ github.event_name == 'push' && 'sync-and-rebuild' || inputs.action }}
        run: |
          python - <<'PY'
          import os
          import sys
          from huggingface_hub import HfApi, restart_space, get_space_runtime, wait_for_space

          token = os.environ.get("HF_TOKEN")
          repo_id = os.environ.get("HF_SPACE_ID", "OSOCONSULT/getem")
          action = os.environ.get("REQUESTED_ACTION") or "sync-and-rebuild"

          if not token:
              raise SystemExit("Missing GitHub Actions secret HF_TOKEN")

          api = HfApi(token=token)
          print(f"Target Space: {repo_id}")
          print(f"Action: {action}")

          if action == "status":
              print(get_space_runtime(repo_id, token=token))
              sys.exit(0)

          if action == "sync-and-rebuild":
              print("Uploading GitHub repository contents to Hugging Face Space...")
              api.upload_folder(
                  repo_id=repo_id,
                  repo_type="space",
                  folder_path=".",
                  commit_message="Sync from ARCHITECTARIEL/cupid",
                  ignore_patterns=[
                      ".git/**",
                      ".github/**",
                      "node_modules/**",
                      "dist/**",
                      ".env",
                      ".env.*",
                  ],
              )
              runtime = restart_space(repo_id, token=token, factory_reboot=True)
              print("Factory rebuild triggered:", runtime)
          elif action == "factory-rebuild":
              runtime = restart_space(repo_id, token=token, factory_reboot=True)
              print("Factory rebuild triggered:", runtime)
          elif action == "restart":
              runtime = restart_space(repo_id, token=token, factory_reboot=False)
              print("Restart triggered:", runtime)
          else:
              raise SystemExit(f"Unknown action: {action}")

          print("Waiting for Space runtime...")
          runtime = wait_for_space(repo_id, token=token, timeout=900, poll_interval=10)
          print("Final runtime:", runtime)
          PY
